name: Update horse data

on:
  schedule:
    # 18:00 every Friday in Asia/Tokyo.
    - cron: "0 9 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Scrape source data
        run: >
          python -m tools.horse_data.scrape_source
          --output ./data/source/workbook.json
          --existing-source-json ./data/source/workbook.json
          --max-workers 8

      - name: Generate JSON data
        run: >
          python tools/horse_data/generate_horselist.py
          --source-json ./data/source/workbook.json
          --output ./json/horselist.json
          --factor-output ./json/factor.json

      - name: Run Python tests
        run: python -m pytest

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /dabimas-data/dist/
          VITE_DEPLOY_MODE: artifact-root

      - name: Commit generated data
        run: |
          if [ -z "$(git status --porcelain data/source/workbook.json json/horselist.json json/factor.json dist)" ]; then
            echo "No generated data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source/workbook.json json/horselist.json json/factor.json dist
          git commit -m "Update generated horse data"
          git push
