    <title>&#12480;&#12499;&#23064;</title>
    <script>
      (() => {
        const deployMode = "artifact-root";
        const basePath = "/dabimas-data/dist/";
        const isArtifactRoot = deployMode === "artifact-root";
        const isGitHubPagesHost = window.location.hostname === "love-dabimas.github.io";
        const isDistPath = /\/dist(?:\/|$)/.test(window.location.pathname);
        const manifestLink = document.createElement("link");

        manifestLink.rel = "manifest";
        manifestLink.href = isArtifactRoot ? `${basePath}manifest.json` : "./dist/manifest.json";
        document.head.append(manifestLink);

        if (!isArtifactRoot && isGitHubPagesHost && !isDistPath) {
          window.location.replace(new URL("./dist/", window.location.href).toString());
        }
      })();
    </script>
    <script type="module" crossorigin src="/dabimas-data/dist/assets/index-BQJm7b8U.js"></script>
